<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rat Bot</title>
  <link rel="stylesheet" href="styles/padrão.css"/>
</head>
<body onload="playBootSound()">
  <audio id="boot-sound" src="boot.mp3" preload="auto"></audio>

  <header>
    <div class="header-container">
      <div class="logo">
        🐭 <span>Rat Bot</span>
      </div>
      <div class="divider"></div>
      <div class="subtitle">Eitor - Plural</div>
    </div>
  </header>

  <main class="content">
    <h2 style="text-align: center; margin: 20px 0;">Apostila 3</h2>

    <section class="progress-section">
      <div class="barra-verde"><span>Matemática A</span><div class="red"><div class="fillgreen">0%</div></div></div>
      <div class="barra-verde"><span>Matemática B</span><div red="amar"><div class="fillgreen">20%</div></div></div>
      <div class="barra-verde"><span>Química A</span><div class="amar"><div class="fillgreen">30%</div></div></div>
      <div class="barra-verde"><span>Português 1</span><div class="bargreen"><div class="fillgreen">100%</div></div></div>
      <div class="barra-verde"><span>Português 2</span><div class="red"><div class="fillgreen">0%</div></div></div>
      <div class="barra-verde"><span>Química B</span><div class="red"><div class="fillgreen">0%</div></div></div>
      <div class="barra-verde"><span>Física A</span><div class="red"><div class="fillgreen">0%</div></div></div>
      <div class="barra-verde"><span>Física B</span><div class="amar"><div class="fillgreen">36%</div></div></div>
      <div class="barra-verde"><span>Inglês</span><div class="red"><div class="fillgreen">0%</div></div></div>
      <div class="barra-verde"><span>História</span><div class="red"><div class="fillgreen">0%</div></div></div>
      <div class="barra-verde"><span>Geografia</span><div class="red"><div class="fillgreen">0%</div></div></div>
      <div class="barra-verde"><span>Biologia A</span><div class="red"><div class="fillgreen">0%</div></div></div>
      <div class="barra-verde"><span>Biologia B</span><div class="red"><div class="fillgreen">0%</div></div></div>

    </section>

    </section>
  </main>

  <footer>
    plurral.net.rat-bot
  </footer>

  <script>
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    });

    document.querySelectorAll('.progress-item').forEach(item => {
      observer.observe(item);
    });

    function playBootSound() {
      document.getElementById('boot-sound').play();
    }
  </script>
</body>
</html>
